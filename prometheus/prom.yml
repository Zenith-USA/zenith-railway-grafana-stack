global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'zenith-api'
    scheme: https
    static_configs:
      - targets: ['${ZENITH_API_TARGET:-api.zenithwellness.health}']
    metrics_path: '/metrics'
    scrape_interval: 15s