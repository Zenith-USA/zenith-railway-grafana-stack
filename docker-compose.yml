version: '3.8'

services:
    
  prometheus:
    build:
      context: ./prometheus
      dockerfile: dockerfile
      args:
        VERSION: latest
    user: root
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    environment:
      - ZENITH_API_TARGET=${ZENITH_API_TARGET:-host.docker.internal:8000}

  loki:
    build:
      context: ./loki
      dockerfile: dockerfile
      args:
        VERSION: latest
    user: root
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

  tempo:
    build:
      context: ./tempo
      dockerfile: dockerfile
      args:
        VERSION: "2.6.1"
    user: root
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - tempo_data:/var/tempo

  grafana:
    build:
      context: ./grafana
      dockerfile: dockerfile
      args:
        VERSION: latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=yourpassword123
      - GF_DEFAULT_INSTANCE_NAME=Grafana
      - GF_INSTALL_PLUGINS=grafana-simple-json-datasource,grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel
      - LOKI_INTERNAL_URL=http://loki:3100
      - PROMETHEUS_INTERNAL_URL=http://prometheus:9090
      - TEMPO_INTERNAL_URL=http://tempo:3200

volumes: 
  prometheus_data:
  loki_data:
  grafana_data:
  tempo_data: